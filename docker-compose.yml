version: '3.8'

services:
  # APEX Router (Rust core)
  router:
    build:
      context: .
      dockerfile: Dockerfile.router
    ports:
      - "3000:3000"
    environment:
      - APEX_PORT=3000
      - APEX_HOST=0.0.0.0
      - APEX_AUTH_DISABLED=${APEX_AUTH_DISABLED:-1}
      - APEX_SHARED_SECRET=${APEX_SHARED_SECRET:-dev-secret-change-in-production}
      - APEX_USE_LLM=${APEX_USE_LLM:-0}
      - APEX_EXECUTION_ISOLATION=docker
      - APEX_DATABASE_URL=sqlite:/data/apex.db
    volumes:
      - apex-data:/data
      - apex-soul:/home/apex/.apex/soul
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /home/apex/.cache:noexec,nosuid,size=50M
    security_opt:
      - seccomp:./infra/seccomp-router.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - apex-network

  # APEX UI (React)
  ui:
    build:
      context: ./ui
      dockerfile: ../Dockerfile.ui
    ports:
      - "8083:80"
    depends_on:
      router:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50M
      - /var/cache/nginx:noexec,nosuid,size=50M
      - /var/log/nginx:noexec,nosuid,size=50M
    security_opt:
      - seccomp:./infra/seccomp-ui.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    networks:
      - apex-network

  # Embedding Server (for memory search)
  embedding:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8081:8081"
    volumes:
      - ./models:/models
    command: >
      --model /models/nomic-embed-text-v1.5.Q4_K_M.gguf
      --embedding
      --port 8081
      --host 0.0.0.0
    restart: unless-stopped
    networks:
      - apex-network

  # LLM Server (optional)
  llama:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      --model /models/Qwen3-4B-Instruct-2507-Q4_K_M.gguf
      --port 8080
      --host 0.0.0.0
      -c 4096
    restart: unless-stopped
    networks:
      - apex-network

  # LocalStack for S3-compatible storage (optional)
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - localstack_data:/tmp/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    profiles:
      - optional

  # Prometheus for metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring

  # Grafana for dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    profiles:
      - monitoring
      - optional

volumes:
  apex-data:
    driver: local
  apex-soul:
    driver: local
  localstack_data:
  prometheus_data:

networks:
  apex-network:
    driver: bridge
