name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-test:
    name: Rust Tests & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"

      - name: Check formatting
        working-directory: core
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        working-directory: core
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        working-directory: core
        run: cargo test --workspace

  rust-bench:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core -> target"

      - name: Run benchmarks
        working-directory: core/router
        run: cargo bench --no-run

  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: ui
        run: pnpm install

      - name: Type check
        working-directory: ui
        run: pnpm exec tsc --noEmit

      - name: Build
        working-directory: ui
        run: pnpm build

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('execution/poetry.lock') }}

      - name: Install dependencies
        working-directory: execution
        run: poetry install

      - name: Run tests
        working-directory: execution
        run: poetry run pytest

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: core
        run: cargo audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        working-directory: ui
        run: pnpm audit --audit-level=high

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    needs: ui-build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t apex-router:latest -f Dockerfile.router .
          docker build -t apex-ui:latest -f ui/Dockerfile ui/

      - name: Run Trivy vulnerability scanner (router)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: apex-router:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Run Trivy vulnerability scanner (UI)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: apex-ui:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Build Rust workspace
        run: cargo build --workspace --quiet
      - name: Run security gates (Phase 2)
        run: bash ./ci/run_security_gates.sh
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install JS deps
        run: |
          (cd gateway && npm ci)
          (cd skills && npm ci)
      - name: Build JS assets
        run: |
          (cd gateway && npm run build --silent) || true
          (cd skills && npm run build --silent) || true
      - name: Run unit tests (Rust)
        run: cargo test --workspace --tests --quiet
      - name: Run unit tests (UI/JS)
        run: |
          (cd gateway && npm test --silent) || true
          (cd skills && npm test --silent) || true

  security-audit:
    name: Security Audit (Cargo/NPM)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: cargo audit
        run: |
          cargo audit -D high -q
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install JS deps
        run: |
          (cd gateway && npm ci)
          (cd skills && npm ci)
      - name: npm ci (gateway)
        run: |
          (cd gateway && npm ci)
      - name: npm audit (gateway)
        run: |
          (cd gateway && npm audit --audit-level=high)
      - name: npm ci (skills)
        run: |
          (cd skills && npm ci)
      - name: npm audit (skills)
        run: |
          (cd skills && npm audit --audit-level=high)
