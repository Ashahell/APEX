global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'apex-router'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/api/v1/metrics'

  - job_name: 'apex-gateway'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/metrics'

  # Note: NATS monitoring disabled (NATS removed from architecture)
  # Use tokio broadcast channels for single-node message bus
